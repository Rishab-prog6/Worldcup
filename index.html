<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026 World Cup Prediction League</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
</head>
<body>
  <header class="hero">
    <h1 id="app-title">⚽ 2026 World Cup Prediction League 🏆</h1>
    <p class="subtitle" id="app-subtitle">USA · Canada · Mexico · Jun 11 – Jul 19 · 48 teams · 104 matches</p>
    <nav class="tabs" id="tabs">
      <button class="tab active" data-tab="board">🏆 Leaderboard</button>
      <button class="tab" data-tab="matches">📅 Fixtures</button>
      <button class="tab" data-tab="predict">✍️ My Predictions</button>
      <button class="tab" data-tab="admin">🛠️ Enter Results</button>
      <button class="tab" data-tab="rules">📖 Rules</button>
      <button class="tab lang" id="lang-toggle" type="button">中文</button>
    </nav>
  </header>

  <main>
    <section id="tab-board" class="tab-panel active"></section>
    <section id="tab-matches" class="tab-panel"></section>
    <section id="tab-predict" class="tab-panel"></section>
    <section id="tab-admin" class="tab-panel"></section>
    <section id="tab-rules" class="tab-panel"></section>
  </main>

  <footer>
    <p id="app-footer"></p>
  </footer>

  <div id="toast"></div>

  <script>
    // cache-bust the data files so visitors always load the latest predictions/results
    ["data/matches.js", "data/predictions.js", "data/results.js"].forEach(function (f) {
      document.write('<script src="' + f + '?v=' + Date.now() + '"><\/script>');
    });
  </script>
  <script src="js/app.js"></script>
</body>
</html>
